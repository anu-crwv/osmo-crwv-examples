version: 2
# alpamayo1.5 SFT (navigation) — SMOKE on Osmo/CoreWeave B300 (b300-8x node), faithful to the upstream
# recipe (NVlabs/alpamayo-recipes alpamayo1_5_sft): native 8-GPU torchrun + DeepSpeed ZeRO-2, Stage-1
# (VLM) -> Stage-2 (trajectory diffusion expert). Verifies the pipeline on a tiny subset (3 nav chunks,
# few steps), tracked in W&B (project alpamayo-osmo). Full run: sft-nav.yaml.
#
# Only B300-specific alteration vs the recipe: the recipe's torch==2.8.0 ships cu128, whose nvrtc cannot
# JIT kernels for B300's compute capability sm_103 (CUDA 12.8 tops out at sm_100/sm_120). We reinstall the
# SAME torch version built against CUDA 12.9 (torch==2.8.0+cu129), which adds sm_103 support and keeps the
# recipe's pinned deps (deepspeed 0.18.2, transformers 4.57.1, flash-attn 2.8.3) compatible.
default-values:
  sft_max_steps: 20
  sft_chunks: "214 224 276"   # 3 of the 19 nav chunks -> ~3 surviving samples (overfit smoke)
workflow:
  name: alpamayo-sft-nav-smoke
  resources:
    sft-gpu8:
      platform: gpu
      gpu: 8
      cpu: 128
      memory: 1024Gi
      storage: 2000Gi
  groups:
    - name: alpamayo-sft-nav-smoke-group
      tasks:
        - name: alpamayo-sft-nav-smoke
          lead: true
          resource: sft-gpu8
          image: nvcr.io/nvidia/pytorch:25.05-py3
          command: [bash]
          args: [/scripts/run.sh]
          credentials:
            workflow-secrets:
              HF_TOKEN: HF_TOKEN
              WANDB_API_KEY: WANDB_API_KEY
              WANDB_ENTITY: WANDB_ENTITY
          files:
            - path: /scripts/run.sh
              contents: |
                #!/usr/bin/env bash
                set -euo pipefail
                export DEBIAN_FRONTEND=noninteractive
                echo "=== alpamayo1.5 SFT (nav) SMOKE — B300 8-GPU, max_steps={{ sft_max_steps }} chunks={{ sft_chunks }} ==="

                # ---- system deps + uv ----
                apt-get update -y >/dev/null 2>&1 || true
                apt-get install -y --no-install-recommends git git-lfs curl ca-certificates unzip >/dev/null 2>&1 || true
                curl -LsSf https://astral.sh/uv/install.sh | sh
                export PATH="$HOME/.local/bin:$PATH"

                export YOUR_HOME=/workspace
                mkdir -p "$YOUR_HOME"; cd "$YOUR_HOME"
                export HF_HUB_ENABLE_HF_TRANSFER=1
                ARCH="$(nvidia-smi --query-gpu=compute_cap --format=csv,noheader 2>/dev/null | head -1 | tr -d ' ')"
                export TORCH_CUDA_ARCH_LIST="${ARCH:-10.0}"
                echo "[env] GPU compute capability: $TORCH_CUDA_ARCH_LIST"

                # ---- clone recipe + build env (recipe pins torch 2.8.0; we then swap to the cu129 build for B300) ----
                git clone --depth 1 https://github.com/NVlabs/alpamayo-recipes.git
                cd alpamayo-recipes/recipes/alpamayo1_5_sft
                uv venv --python 3.12 a1_5_sft
                source a1_5_sft/bin/activate
                uv sync --active --no-install-package flash-attn       # recipe deps (torch 2.8.0 cu128) minus flash-attn
                # B300 (sm_103) fix: same torch version, CUDA 12.9 build -> nvrtc that supports sm_103
                uv pip install --reinstall torch==2.8.0 torchvision==0.23.0 --index-url https://download.pytorch.org/whl/cu129
                # build flash-attn against the cu129 torch (NOT `uv sync`, which would revert torch to the cu128 pin)
                uv pip install flash-attn==2.8.3 --no-build-isolation || echo "[warn] flash-attn build failed -> SDPA fallback"
                uv pip install hf_transfer
                python -c "import torch;print('[env] torch',torch.__version__,'cuda',torch.version.cuda)"
                REPO="$YOUR_HOME/alpamayo-recipes"

                # ---- base checkpoint: download + convert to A1 format (recipe: convert_checkpoint.py to-a1) ----
                export MODEL_DIR="$YOUR_HOME/Alpamayo-1.5-10B"
                export A1_DIR="$YOUR_HOME/Alpamayo-1.5-10B-A1-format"
                MODEL_DIR="$MODEL_DIR" python - <<'PY'
                import os
                from huggingface_hub import snapshot_download
                snapshot_download("nvidia/Alpamayo-1.5-10B", local_dir=os.environ["MODEL_DIR"],
                                  token=os.environ.get("HF_TOKEN"), max_workers=8)
                print("[model] Alpamayo-1.5-10B downloaded", flush=True)
                PY
                cd "$REPO"
                python scripts/convert_checkpoint.py to-a1 --input "$MODEL_DIR" --output "$A1_DIR"

                # ---- nav annotations (20-sample overfit demo) ----
                NAV_JSON="$YOUR_HOME/nav_demo_samples.json"
                curl -fsSL https://raw.githubusercontent.com/NVlabs/alpamayo1.5/main/notebooks/nav_demo_samples.json -o "$NAV_JSON"

                # ---- PAI data: smoke chunk subset (PAIDatasetWithNav drops samples not in the loaded chunks) ----
                export PAI_DIR="$YOUR_HOME/pai_dataset"
                export SFT_CHUNKS="{{ sft_chunks }}"
                echo "[data] downloading PAI chunks: $SFT_CHUNKS"
                python scripts/download_pai.py \
                  --chunk-ids "$SFT_CHUNKS" \
                  --camera camera_front_wide_120fov camera_cross_left_120fov camera_cross_right_120fov camera_front_tele_30fov \
                  --calibration camera_intrinsics sensor_extrinsics \
                  --labels egomotion \
                  --output-dir "$PAI_DIR"
                CHUNK_LIST="[$(echo "$SFT_CHUNKS" | tr ' ' ',')]"
                echo "[data] dataset chunk_ids: $CHUNK_LIST"

                # ---- W&B (recipe: uncomment wandb default, fill team/project, set report_to=wandb) ----
                export WANDB_PROJECT="${WANDB_PROJECT:-alpamayo-osmo}"
                # NOTE: do NOT set WANDB_LOG_MODEL — transformers 4.57.1's WandbCallback.on_train_end does an
                # extra save_model() that, under DeepSpeed, calls accelerate.get_state_dict() -> the removed
                # Accelerator.deepspeed_config attr ("'Accelerator' object has no attribute 'deepspeed_config'"),
                # which crashes the job AFTER training completes. We log each finetuned model EXPLICITLY below
                # (post-torchrun, non-fatal), consistent with how the RL recipe logs its policy artifact.
                cd "$REPO/recipes/alpamayo1_5_sft"
                sed -i 's|# - /wandb: default|- /wandb: default|' configs/sft_base.yaml
                sed -i "s|team: ???|team: ${WANDB_ENTITY}|" configs/wandb/default.yaml
                sed -i "s|project: ???|project: ${WANDB_PROJECT}|" configs/wandb/default.yaml
                DS_CFG="$(pwd)/configs/deepspeed/zero2.json"

                # log a finetuned checkpoint as a W&B model artifact (model weights only — skip the DeepSpeed
                # optimizer shards in global_step*/ and the optimizer/scheduler/rng state). Non-fatal: a W&B
                # hiccup must never fail an otherwise-good run.
                log_model_artifact() {
                CKPT="$1" ARTNAME="$2" python - <<'PY' || echo "[wandb] artifact log failed (non-fatal)"
                import os, wandb
                ckpt = os.environ["CKPT"]; name = os.environ["ARTNAME"]
                if not (os.path.isdir(ckpt) and os.listdir(ckpt)):
                    print("[wandb] no checkpoint to log:", ckpt); raise SystemExit(0)
                run = wandb.init(project=os.environ.get("WANDB_PROJECT","alpamayo-osmo"),
                                 entity=os.environ.get("WANDB_ENTITY"), name=name, job_type="model")
                art = wandb.Artifact(name, type="model"); n = 0
                for root, _, files in os.walk(ckpt):
                    if "global_step" in root: continue
                    for fn in files:
                        if fn.startswith(("optimizer", "scheduler", "rng_state")): continue
                        p = os.path.join(root, fn); art.add_file(p, name=os.path.relpath(p, ckpt)); n += 1
                print(f"[wandb] adding {n} model files from {ckpt}", flush=True)
                run.log_artifact(art); run.finish()
                print("[wandb] artifact logged:", name)
                PY
                }

                # ---- Stage 1: VLM SFT — recipe launch (8-GPU torchrun + DeepSpeed ZeRO-2) ----
                # dataloader_num_workers=0: osmo containers have a tiny /dev/shm; >0 workers overflow it.
                export WANDB_NAME="alpamayo-sft-nav-smoke-stage1"
                OUT1="$YOUR_HOME/output_stage1_nav"
                torchrun --nproc_per_node 8 -m alpamayo1_5_sft.train_hf \
                  --config-path pkg://alpamayo1_5_sft/configs \
                  --config-name sft_stage1_nav \
                  model.checkpoint_path="$A1_DIR" \
                  data.train_dataset.local_dir="$PAI_DIR" \
                  data.train_dataset.annotations_path="$NAV_JSON" \
                  data.train_dataset.chunk_ids="$CHUNK_LIST" \
                  data.val_dataset.local_dir="$PAI_DIR" \
                  data.val_dataset.annotations_path="$NAV_JSON" \
                  data.val_dataset.chunk_ids="$CHUNK_LIST" \
                  trainer.deepspeed="$DS_CFG" \
                  trainer.dataloader_num_workers=0 \
                  trainer.report_to=wandb \
                  +trainer.max_steps={{ sft_max_steps }} \
                  trainer.save_steps={{ sft_max_steps }} \
                  paths.output_dir="$OUT1"
                CKPT1=$(ls -d "$OUT1"/checkpoint-* | sort -V | tail -1)
                echo "[stage1] checkpoint: $CKPT1"
                log_model_artifact "$CKPT1" "alpamayo-sft-nav-smoke-stage1"

                # ---- Stage 2: trajectory diffusion expert — recipe launch ----
                export WANDB_NAME="alpamayo-sft-nav-smoke-stage2"
                OUT2="$YOUR_HOME/output_stage2_nav"
                torchrun --nproc_per_node 8 -m alpamayo1_5_sft.train_hf \
                  --config-path pkg://alpamayo1_5_sft/configs \
                  --config-name sft_stage2_nav \
                  model.pretrained_model_name_or_path="$A1_DIR" \
                  model.stage1_vlm_checkpoint_path="$CKPT1" \
                  data.train_dataset.local_dir="$PAI_DIR" \
                  data.train_dataset.annotations_path="$NAV_JSON" \
                  data.train_dataset.chunk_ids="$CHUNK_LIST" \
                  data.val_dataset.local_dir="$PAI_DIR" \
                  data.val_dataset.annotations_path="$NAV_JSON" \
                  data.val_dataset.chunk_ids="$CHUNK_LIST" \
                  trainer.dataloader_num_workers=0 \
                  trainer.report_to=wandb \
                  +trainer.max_steps={{ sft_max_steps }} \
                  trainer.save_steps={{ sft_max_steps }} \
                  paths.output_dir="$OUT2"
                CKPT2=$(ls -d "$OUT2"/checkpoint-* | sort -V | tail -1)
                echo "[stage2] checkpoint: $CKPT2"
                log_model_artifact "$CKPT2" "alpamayo-sft-nav-smoke-stage2"
                echo "=== alpamayo1.5 SFT (nav) SMOKE DONE — stage1+stage2 complete ==="
