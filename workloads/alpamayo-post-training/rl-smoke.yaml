version: 2
# alpamayo1.x RL (GRPO via Cosmos-RL) — SMOKE on Osmo/CoreWeave, 2 GPUs (target: B300).
# Post-trains the RELEASED Alpamayo-1.5-10B. policy = 1 GPU (dp_shard_size=1, no FSDP shard) + rollout =
# 1 GPU vLLM. A tiny PAI clip set + 1 epoch verifies the whole loop end-to-end, tracked in W&B.
# Single-GPU-per-replica => no multi-GPU FSDP NCCL; on B300 the policy<->rollout sync uses NVLink P2P,
# so none of the RTX-6000 /dev/shm / NCCL / P2P workarounds are needed. Full run: rl.yaml.
# The 10B policy training needs ~160GB: fits natively on one B300; will OOM on a 96GB RTX 6000.
default-values:
  rl_epochs: 1
  rl_n_generation: 4
  rl_batch_per_replica: 8
  rl_num_samples: 16
workflow:
  name: alpamayo-rl-smoke
  resources:
    rl-gpu2:
      platform: gpu
      gpu: 2
      cpu: 48
      memory: 512Gi
      storage: 1200Gi
  groups:
    - name: alpamayo-rl-smoke-group
      tasks:
        - name: alpamayo-rl-smoke
          lead: true
          resource: rl-gpu2
          image: nvcr.io/nvidia/pytorch:25.05-py3
          command: [bash]
          args: [/scripts/run.sh]
          credentials:
            workflow-secrets:
              HF_TOKEN: HF_TOKEN
              WANDB_API_KEY: WANDB_API_KEY
              WANDB_ENTITY: WANDB_ENTITY
          files:
            - path: /scripts/run.sh
              contents: |
                #!/usr/bin/env bash
                set -euo pipefail
                export DEBIAN_FRONTEND=noninteractive
                # cosmos-rl spawns a redis daemon and we background `tail -F` log-streamers; if these outlive the
                # script the osmo task never exits (pod lingers RUNNING, holding the node) even after SMOKE DONE.
                # Reap them on every exit path so the task self-terminates cleanly.
                trap 'pkill -f "tail -n +1 -F" 2>/dev/null; pkill -x redis-server 2>/dev/null; true' EXIT
                echo "=== alpamayo1.x RL (GRPO) SMOKE — 2 GPU, epochs={{ rl_epochs }} n_gen={{ rl_n_generation }} batch={{ rl_batch_per_replica }} samples={{ rl_num_samples }} ==="

                # ---- system deps + uv (redis-server: cosmos-rl dispatcher backplane) ----
                apt-get update -y >/dev/null 2>&1 || true
                apt-get install -y --no-install-recommends git git-lfs curl ca-certificates redis-server >/dev/null 2>&1 || true
                command -v redis-server >/dev/null || { echo "[fatal] redis-server not installed"; exit 1; }
                curl -LsSf https://astral.sh/uv/install.sh | sh
                export PATH="$HOME/.local/bin:$PATH"

                export YOUR_HOME=/workspace
                mkdir -p "$YOUR_HOME"; cd "$YOUR_HOME"
                export HF_HUB_ENABLE_HF_TRANSFER=1
                export PYTHONUNBUFFERED=1
                export HF_HOME="$YOUR_HOME/.cache/huggingface"
                ARCH="$(nvidia-smi --query-gpu=compute_cap --format=csv,noheader 2>/dev/null | head -1 | tr -d ' ')"
                export TORCH_CUDA_ARCH_LIST="${ARCH:-12.0}"
                echo "[env] building for compute capability: $TORCH_CUDA_ARCH_LIST"

                # ---- clone recipe + build env (cosmos-rl + vllm 0.11 + torch 2.8 cu128; flash-attn build-or-SDPA) ----
                git clone --depth 1 https://github.com/NVlabs/alpamayo-recipes.git
                cd alpamayo-recipes/recipes/alpamayo1_x_rl
                uv venv --python 3.12 a1x_rl
                source a1x_rl/bin/activate
                uv sync --active --no-install-package flash-attn       # torch 2.8.0 cu128 + vllm 0.11 + cosmos-rl, minus flash-attn
                # B300 (sm_103) fix: same torch version, CUDA 12.9 build -> nvrtc + triton/ptxas that support sm_103
                # (the cu128 stack fails with "ptxas fatal: Value 'sm_103a' is not defined").
                uv pip install --reinstall torch==2.8.0 torchvision==0.23.0 --index-url https://download.pytorch.org/whl/cu129
                # build flash-attn against the cu129 torch (NOT `uv sync`, which would revert torch to the cu128 pin)
                uv pip install flash-attn==2.8.3 --no-build-isolation || echo "[warn] flash-attn build failed -> SDPA fallback"
                uv pip install hf_transfer
                # vLLM 0.11's rollout engine imports numba, which requires NumPy <= 2.2; the resolved env pulls
                # NumPy 2.4 ("ImportError: Numba needs NumPy 2.2 or less"), crashing the rollout worker -> pin down.
                uv pip install "numpy<2.3"
                python -c "import numpy,torch;print('[env] numpy',numpy.__version__,'torch',torch.__version__,'cuda',torch.version.cuda)"
                # Triton (bundled with torch 2.8) ships its OWN CUDA 12.8 ptxas, which lacks sm_103a and breaks the
                # vLLM rollout's Triton JIT ("ptxas fatal: Value 'sm_103a' is not defined"). The cu129 torch swap
                # only fixes torch's own nvrtc, NOT Triton's bundled ptxas -> install a CUDA 12.9 ptxas and point
                # Triton at it via TRITON_PTXAS_PATH (a 12.9 ptxas compiles Triton's PTX for sm_103a fine).
                uv pip install "nvidia-cuda-nvcc-cu12>=12.9,<13"
                TRITON_PTXAS_PATH="$(find "${VIRTUAL_ENV:-.}" -path '*/nvidia/cuda_nvcc/bin/ptxas' 2>/dev/null | head -1)"
                if [ -z "$TRITON_PTXAS_PATH" ] && [ -x /usr/local/cuda/bin/ptxas ]; then TRITON_PTXAS_PATH=/usr/local/cuda/bin/ptxas; fi
                export TRITON_PTXAS_PATH
                echo "[env] TRITON_PTXAS_PATH=${TRITON_PTXAS_PATH:-<unset>}"
                [ -n "${TRITON_PTXAS_PATH:-}" ] && "$TRITON_PTXAS_PATH" --version 2>/dev/null | tail -1 || true
                export ALPAMAYO_WORKSPACE="$YOUR_HOME/alpamayo-recipes"
                cd "$ALPAMAYO_WORKSPACE"

                # ---- convert released Alpamayo-1.5-10B -> RL training format (downloads Alpamayo + Cosmos-Reason2-8B) ----
                export ALPAMAYO_MODEL_DIR="$YOUR_HOME/alpamayo_rl_model"
                echo "[step] convert_release_config_to_training START $(date -u +%T)"
                python -u scripts/convert_release_config_to_training.py \
                  --alpamayo-model nvidia/Alpamayo-1.5-10B \
                  --output-dir "$ALPAMAYO_MODEL_DIR"
                echo "[step] convert DONE $(date -u +%T)"

                # ---- PAI mini (chunk 3116) + curate clip index (entry expects clip_index_mini.parquet) ----
                export ALPAMAYO_PAI_LOCAL_DIR="$YOUR_HOME/PAI_mini"
                echo "[step] download_pai chunk 3116 START $(date -u +%T)"
                python -u scripts/download_pai.py --chunk-ids 3116 \
                  --camera camera_front_wide_120fov camera_cross_left_120fov camera_cross_right_120fov camera_front_tele_30fov \
                  --calibration camera_intrinsics sensor_extrinsics vehicle_dimensions --labels egomotion \
                  --output-dir "$ALPAMAYO_PAI_LOCAL_DIR"
                echo "[step] curate_pai_samples ({{ rl_num_samples }}) START $(date -u +%T)"
                python -u scripts/curate_pai_samples.py \
                  --clip-index-path "$ALPAMAYO_PAI_LOCAL_DIR/clip_index.parquet" \
                  --chunk 3116 --num-samples {{ rl_num_samples }} \
                  --output-path "$ALPAMAYO_PAI_LOCAL_DIR/clip_index_mini.parquet"
                echo "[step] data DONE $(date -u +%T)"

                # ---- configure the local-test TOML: model path, output, single-GPU policy, smoke scale, W&B ----
                export ALPAMAYO_LOG_DIR="$YOUR_HOME/rl_logs"; mkdir -p "$ALPAMAYO_LOG_DIR"
                TOML="recipes/alpamayo1_x_rl/toml/alpamayo_rvla_rl_local_test.toml"
                sed -i "s|/path/to/converted_alpamayo_model|${ALPAMAYO_MODEL_DIR}|" "$TOML"
                sed -i "s|/path/to/alpamayo_cosmos_rl_job/outputs|${YOUR_HOME}/rl_outputs|" "$TOML"
                sed -i "s|^epoch = .*|epoch = {{ rl_epochs }}|" "$TOML"
                sed -i "s|^train_batch_per_replica = .*|train_batch_per_replica = {{ rl_batch_per_replica }}|" "$TOML"
                sed -i "s|^n_generation = 12|n_generation = {{ rl_n_generation }}|" "$TOML"
                sed -i "s|^dp_shard_size = 4|dp_shard_size = 1|" "$TOML"     # policy on a single GPU (10B fits on one B300)
                sed -i "s|^capacity = 16|capacity = 0|" "$TOML"             # node-prefetch off: synchronous data path (no /dev/shm staging)
                sed -i 's|project_name = "Alpamayo_RL"|project_name = "alpamayo-osmo"|' "$TOML"
                sed -i 's|experiment_name = "ReasoningVLA_Post_Training"|experiment_name = "alpamayo-rl-smoke"|' "$TOML"

                # ---- launch GRPO: policy (1 GPU) + rollout (1 GPU vLLM). cosmos-rl writes per-replica .log
                # files (not stdout) and HANGS if a replica dies, so stream the logs live + watchdog-kill. ----
                export HYDRA_FULL_ERROR=1 COSMOS_LOG_LEVEL=INFO
                # The policy<->rollout weight-sync NCCL comm (POLICY_TO_ROLLOUT_UNICAST) failed at create_nccl_comm
                # with ncclSystemError (err=2): NCCL's cross-process SHM transport starves on osmo's ~64MB /dev/shm.
                # B300 GPUs are P2P/NVLink-capable, so disable SHM (forces P2P/NVLink for the same-node comm) and
                # enable cuMem so cross-process P2P buffer registration works. NCCL_DEBUG surfaces the transport.
                export NCCL_SHM_DISABLE=1
                export NCCL_CUMEM_ENABLE=1
                export NCCL_DEBUG=INFO
                export NCCL_DEBUG_SUBSYS=INIT,NET,GRAPH,ENV
                echo "[step] launching cosmos-rl GRPO START $(date -u +%T)"
                CRL_OUT="$YOUR_HOME/cosmos_rl_stdout.log"
                set +e
                stdbuf -oL -eL cosmos-rl --config "$TOML" --policy 1 --rollout 1 --log-dir "$ALPAMAYO_LOG_DIR" \
                  recipes/alpamayo1_x_rl/models/reasoning_vla/alpamayo_cosmos_rl_post_training_entry.py \
                  > "$CRL_OUT" 2>&1 &
                CRL_PID=$!
                ( STREAMED=""                                    # init: under `set -u` an unset $STREAMED kills this
                  tail -n +1 -F "$CRL_OUT" 2>/dev/null & \       # streamer, so per-replica logs never reach stdout
                  while kill -0 "$CRL_PID" 2>/dev/null; do
                    for f in $(find "$ALPAMAYO_LOG_DIR" -name '*.log' 2>/dev/null); do
                      case "$STREAMED" in *"|$f|"*) ;; *) STREAMED="${STREAMED}|$f|"; tail -n +1 -F "$f" 2>/dev/null & ;; esac
                    done
                    sleep 5
                  done ) &
                STREAM_PID=$!
                ( while kill -0 "$CRL_PID" 2>/dev/null; do
                    if grep -qE "failed with return code|Process .* exited with code [1-9]" "$CRL_OUT" 2>/dev/null; then
                      echo "[watchdog] replica failure detected -> terminating cosmos-rl"
                      kill "$CRL_PID" 2>/dev/null; sleep 8; kill -9 "$CRL_PID" 2>/dev/null; break
                    fi
                    sleep 10
                  done ) &
                WD_PID=$!
                wait "$CRL_PID"; RC=$?
                kill "$STREAM_PID" "$WD_PID" 2>/dev/null || true
                set -e
                sleep 3
                echo "=== cosmos-rl per-replica logs (controller / policy / rollout) ==="
                for f in $(find "$ALPAMAYO_LOG_DIR" -name '*.log' 2>/dev/null | sort); do
                  echo "----------------------------- $f -----------------------------"
                  tail -150 "$f" 2>/dev/null || true
                done
                [ "$RC" -eq 0 ] || { echo "cosmos-rl exited $RC"; exit "$RC"; }

                # ---- log the trained policy checkpoint as a W&B model artifact (cosmos-rl is not HF Trainer,
                # so WANDB_LOG_MODEL does not apply -> log it explicitly) ----
                export WANDB_PROJECT="${WANDB_PROJECT:-alpamayo-osmo}"
                python - <<'PY'
                import os, wandb
                out = os.path.join(os.environ["YOUR_HOME"], "rl_outputs")
                run = wandb.init(project=os.environ.get("WANDB_PROJECT","alpamayo-osmo"), entity=os.environ.get("WANDB_ENTITY"), name="alpamayo-rl-smoke-policy", job_type="model")
                art = wandb.Artifact("alpamayo-rl-smoke-policy", type="model")
                art.add_dir(out) if os.path.isdir(out) and os.listdir(out) else print("[wandb] no rl_outputs to log:", out)
                run.log_artifact(art)
                run.finish()
                print("[wandb] RL policy artifact logged from", out)
                PY
                echo "=== alpamayo1.x RL (GRPO) SMOKE DONE ==="
